<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Habit Tracker</title>

    <style>
        /* Basic page */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #b78edb;
        }

        /* Sidebar */
        .sidebar {
            width: 120px;
            background: #b78edb;
            float: left;
            padding: 10px;
            text-align: center;
            border-right: 2px solid black;
        }

        .sidebar-header {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .nav-item {
            display: block;
            margin: 100px 0;
            text-decoration: none;
            color: black;
        }

        .nav-item:hover {
            background: lightgray;
        }

        .user-section {
            margin-top: 20px;
        }

        /* Main content */
        .main-content {
            margin-left: 140px;
            padding: 20px;
            text-align: center;
        }

        .title {
            margin-bottom: 20px;
        }

        /* Habit cards */
        .habit-card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            width: 80%;
            text-align: left;
        }

        .habit-name {
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Simple layout for days */
        .day-column {
            display: inline-block;
            margin-right: 15px;
            text-align: center;
        }

        .day-duration {
            font-size: 12px;
        }

        /* Button */
        .add-habit-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">Schedule<br>Builder</div>

        <a href="Dashboard.html" class="nav-item">Dashboard</a>
        <a href="#" class="nav-item">Calendar</a>
        <a href="#" class="nav-item">To do</a>
        <a href="Color.html" class="nav-item">Habit Tracker</a>
        <a href="#" class="nav-item">Settings</a>

        <div class="user-section">
            <div>👤</div>
            <div>User</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <h1 class="title">Habit Tracker</h1>

        <!-- Focus Mode -->
        <div class="habit-card">
            <div class="habit-name">Focus mode</div>

            <div class="day-column">
                <div class="day-duration">3+ hr</div>
                <input type="checkbox" checked>
            </div>

            <div class="day-column">
                <div class="day-duration">3+ hr</div>
                <input type="checkbox">
            </div>

            <div class="day-column">
                <div class="day-duration">3+ hr</div>
                <input type="checkbox" checked>
            </div>

            <div class="day-column">
                <div class="day-duration">3+ hr</div>
                <input type="checkbox" checked>
            </div>
        </div>

        <!-- Studying -->
        <div class="habit-card">
            <div class="habit-name">Studying</div>

            <div class="day-column">
                <div class="day-duration">2+ hr</div>
                <input type="checkbox" checked>
            </div>

            <div class="day-column">
                <div class="day-duration">2+ hr</div>
                <input type="checkbox" checked>
            </div>

            <div class="day-column">
                <div class="day-duration">2+ hr</div>
                <input type="checkbox">
            </div>

            <div class="day-column">
                <div class="day-duration">2+ hr</div>
                <input type="checkbox" checked>
            </div>
        </div>

        <!-- Exercise -->
        <div class="habit-card">
            <div class="habit-name">Exercise</div>

            <div class="day-column">
                <div class="day-duration">1+ hr</div>
                <input type="checkbox" checked>
            </div>

            <div class="day-column">
                <div class="day-duration">1+ hr</div>
                <input type="checkbox" checked>
            </div>

            <div class="day-column">
                <div class="day-duration">1+ hr</div>
                <input type="checkbox" checked>
            </div>

            <div class="day-column">
                <div class="day-duration">1+ hr</div>
                <input type="checkbox" checked>
            </div>
        </div>

        <!-- Button -->
        <button class="add-habit-btn">+ Add a habit to track</button>

    </div>
 <!-- Footer -->
    <footer>
        <p>© 2026 Schedly</p>
    </footer>
</body>
</html>
