<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #ff6fb8 0%, #ff5aa5 100%);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 110px;
            background: linear-gradient(180deg, #ff6fb8 0%, #ff5aa5 100%);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            border-right: 3px solid #333;
        }

        .sidebar-header {
            padding: 0 10px 20px 10px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            line-height: 1.3;
        }

        .nav-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 12px;
        }

        .nav-item {
            font-size: 13px;
            padding: 8px 6px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            font-weight: bold;
            background: rgba(255, 255, 255, 0.15);
        }

        .user-section {
            padding-top: 20px;
            border-top: 2px solid rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-label {
            font-size: 11px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: #1a1a1a;
            border-bottom: 3px solid #1a1a1a;
            display: inline-block;
            padding-bottom: 8px;
        }

        /* Dashboard Container */
        .dashboard-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* Focus Mode Card */
        .focus-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            color: white;
            min-width: 200px;
            text-align: center;
        }

        .focus-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .focus-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .focus-option {
            font-size: 16px;
            padding: 8px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .focus-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Progress Circle */
        .progress-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 15px solid #ff6fb8;
            margin-bottom: 20px;
        }

        .progress-text {
            font-size: 64px;
            font-weight: bold;
            color: #ff6fb8;
        }

        /* Goals Card */
        .goals-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            min-width: 250px;
        }

        .goals-item {
            font-size: 16px;
            margin-bottom: 15px;
            color: #1a1a1a;
        }

        /* Assignments Section */
        .assignments-section {
            margin-top: 40px;
            width: 100%;
        }

        .assignments-title {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        .assignments-list {
            margin-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .assignment-item {
            font-size: 18px;
            color: #1a1a1a;
            list-style-type: disc;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">Schedule<br>Builder</div>
        <div class="nav-items">
            <a href="Dashboard.html" class="nav-item active">Dashboard</a>
            <a href="#" class="nav-item">Calendar</a>
            <a href="#" class="nav-item">To do</a>
            <a href="Color.html" class="nav-item">Habit<br>Tracker</a>
            <a href="#" class="nav-item">Settings</a>
        </div>
        <div class="user-section">
            <div class="user-avatar">👤</div>
            <div class="user-label">User</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h1 class="title">Progress Dashboard</h1>
        </div>

        <div class="dashboard-container">
            <!-- Focus Mode Card -->
            <div class="focus-card">
                <div class="focus-title">Focus Mode</div>
                <div class="focus-options">
                    <div class="focus-option">On</div>
                    <div class="focus-option">Off</div>
                </div>
            </div>

            <!-- Progress Circle -->
            <div class="progress-section">
                <div class="progress-circle">
                    <div class="progress-text">0/10</div>
                </div>
            </div>

            <!-- Goals Card -->
            <div class="goals-card">
                <div class="goals-item">Go to: ~~~~~~</div>
                <div class="goals-item">Go to: ~~~~~~</div>
                <div class="goals-item">Go to: ~~~~~~</div>
            </div>
        </div>

        <!-- Assignments Section -->
        <div class="assignments-section">
            <div class="assignments-title">0/10 Assignments Finished</div>
            <ul class="assignments-list">
                <li class="assignment-item">0/3 Calculus 1</li>
                <li class="assignment-item">0/4 Princ. Chemistry</li>
                <li class="assignment-item">0/3 Comp. Thinking</li>
            </ul>
        </div>
    </div>
</body>
</html>
