<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #b78edb 0%, #a66dd9 100%);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 110px;
            background: linear-gradient(180deg, #b78edb 0%, #a66dd9 100%);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            border-right: 3px solid #333;
        }

        .sidebar-header {
            padding: 0 10px 20px 10px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            line-height: 1.3;
        }

        .nav-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 12px;
        }

        .nav-item {
            font-size: 13px;
            padding: 8px 6px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            font-weight: bold;
            background: rgba(255, 255, 255, 0.15);
        }

        .user-section {
            padding-top: 20px;
            border-top: 2px solid rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-label {
            font-size: 11px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: #1a1a1a;
            border-bottom: 3px solid #1a1a1a;
            display: inline-block;
            padding-bottom: 8px;
        }

        /* Habit Cards */
        .habits-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .habit-card {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .habit-name {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a1a;
        }

        .habit-details {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .day-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .day-duration {
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #1a1a1a;
        }

        /* Add Habit Button */
        .add-habit-btn {
            background: white;
            border: none;
            border-radius: 25px;
            padding: 15px 40px;
            font-size: 16px;
            color: #1a1a1a;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }

        .add-habit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .add-habit-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">Schedule<br>Builder</div>
        <div class="nav-items">
            <a href="Dashboard.html" class="nav-item">Dashboard</a>
            <a href="#" class="nav-item">Calendar</a>
            <a href="#" class="nav-item">To do</a>
            <a href="Color.html" class="nav-item active">Habit<br>Tracker</a>
            <a href="#" class="nav-item">Settings</a>
        </div>
        <div class="user-section">
            <div class="user-avatar">👤</div>
            <div class="user-label">User</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h1 class="title">Habit Tracker</h1>
        </div>

        <div class="habits-container">
            <!-- Focus Mode Habit -->
            <div class="habit-card">
                <div class="habit-name">Focus mode</div>
                <div class="habit-details">
                    <div class="day-column">
                        <div class="day-duration">3+ hr</div>
                        <input type="checkbox" class="checkbox" checked>
                    </div>
                    <div class="day-column">
                        <div class="day-duration">3+ hr</div>
                        <input type="checkbox" class="checkbox">
                    </div>
                    <div class="day-column">
                        <div class="day-duration">3+ hr</div>
                        <input type="checkbox" class="checkbox" checked>
                    </div>
                    <div class="day-column">
                        <div class="day-duration">3+ hr</div>
                        <input type="checkbox" class="checkbox" checked>
                    </div>
                </div>
            </div>

            <!-- Studying Habit -->
            <div class="habit-card">
                <div class="habit-name">Studying</div>
                <div class="habit-details">
                    <div class="day-column">
                        <div class="day-duration">2+ hr</div>
                        <input type="checkbox" class="checkbox" checked>
                    </div>
                    <div class="day-column">
                        <div class="day-duration">2+ hr</div>
                        <input type="checkbox" class="checkbox" checked>
                    </div>
                    <div class="day-column">
                        <div class="day-duration">2+ hr</div>
                        <input type="checkbox" class="checkbox">
                    </div>
                    <div class="day-column">
                        <div class="day-duration">2+ hr</div>
                        <input type="checkbox" class="checkbox" checked>
                    </div>
                </div>
            </div>

            <!-- Exercise Habit -->
            <div class="habit-card">
                <div class="habit-name">Exercise</div>
                <div class="habit-details">
                    <div class="day-column">
                        <div class="day-duration">1+ hr</div>
                        <input type="checkbox" class="checkbox" checked>
                    </div>
                    <div class="day-column">
                        <div class="day-duration">1+ hr</div>
                        <input type="checkbox" class="checkbox" checked>
                    </div>
                    <div class="day-column">
                        <div class="day-duration">1+ hr</div>
                        <input type="checkbox" class="checkbox" checked>
                    </div>
                    <div class="day-column">
                        <div class="day-duration">1+ hr</div>
                        <input type="checkbox" class="checkbox" checked>
                    </div>
                </div>
            </div>
        </div>

        <button class="add-habit-btn">+ Add a habit to track</button>
    </div>
</body>
</html>
